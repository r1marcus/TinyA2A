sentence=Reference C implementation of the TinyA2A and A2A-Z agentic protocols for embedded devices.
paragraph=TinyA2A is a constrained JSON envelope format for MCU-class agents (intent vocabulary, idempotency journal, offline queue). A2A-Z is a deterministic 64-byte binary frame for sub-millisecond local control loops over CAN-FD/TSN/UWB. Built on the A2A intent model. Pure C, no dynamic allocation in hot paths.
