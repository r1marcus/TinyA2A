name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build + pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Build native library
        run: make

      - name: Run Python tests against shared lib
        run: make pytest

  cmake-build:
    name: cmake native build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release -j

  cortex-m-cross:
    name: arm-none-eabi cross-compile (Cortex-M4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install arm-none-eabi toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
      - name: Configure (Cortex-M4)
        run: |
          cmake -B build-cm4 \
            -DCMAKE_TOOLCHAIN_FILE=port/cmake/arm-none-eabi.cmake \
            -DTA2A_TARGET_CPU=cortex-m4
      - name: Build static lib
        run: cmake --build build-cm4 -j
